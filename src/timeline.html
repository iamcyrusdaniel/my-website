<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <title>Timeline</title>
        <style>
            .page-loader {
                position: absolute;
                top: 0;
                left: 0;
                width: 100vw;
                height: 100vh;
                background: #001432;
                z-index: 9999;
                transition: opacity 0.5s ease, visibility 0.5s ease;
            }
            #loaderHidden {
                opacity: 0;
                visibility: hidden;
                pointer-events: none;
            }
        </style>
    </head>
    <body>
        <div class="page-loader"></div>
        <header id="navigation">
            <ul>
                <div>
                    <li><a href="/index.html">Home</a></li>
                    <li><a href="/src/aboutMe.html">About Me</a></li>
                    <li><a href="/src/myInterests.html">My Interests</a></li>
                    <li><a href="/src/timeline.html" id="current">Timeline</a></li>
                    <li><a href="/src/extras.html">Extras</a></li>
                    <li><a href="/src/contactMe.html">Contact Me</a></li>
                    <button id="nightButton"><img id="nightButtonImage" src="https://cdn-icons-png.flaticon.com/512/6714/6714978.png" alt=""></button>
                </div>
            </ul>
        </header>
        <h1 id="title">Timeline</h1>
        <div id = "timelineLine">
            <div id="dot1" class="timelineDot">
                <button id="scratchButton" class="timelineButton">
                    <img class="timelineImage" src="https://pbs.twimg.com/profile_images/1080557016463147008/sPN7F0Dd_400x400.jpg" alt="Scratch icon">
                </button>
                <h4 id="scratchButtonText" class="timelineText"></h4>
            </div>
            <div id="dot2" class="timelineDot">
                <button id="codeButton" class="timelineButton">
                    <img class="timelineImage" src="https://static.vecteezy.com/system/resources/previews/026/328/572/non_2x/code-icon-symbol-design-illustration-vector.jpg" alt="Code icon">
                </button>
                <h4 id="codeButtonText" class="timelineText"></h4>
            </div>
            <div id="dot3" class="timelineDot">
                <button id="unityButton" class="timelineButton">
                    <img class="timelineImage" src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRbkpZIoSEaZ9sz4Q8w9JcjMYo5O1XsoRmnaz_crR_2ag&s=10" alt="Unity icon">
                </button>
                <h4 id="unityButtonText" class="timelineText"></h4>
            </div>
            <div id="dot4" class="timelineDot">
                <button id="stardanceButton" class="timelineButton">
                    <img class="timelineImage" src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSBKfld3ADq8NopDVlJk-wlb8xsWoORDf4fBWfBQ3cQ5g&s" alt="Stardance icon">
                </button>
                <h4 id="stardanceButtonText" class="timelineText"></h4>
            </div>
        </div>
        <script type="module" src="/src/main.js"></script>
    </body>
